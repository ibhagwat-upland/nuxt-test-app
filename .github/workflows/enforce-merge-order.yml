name: Enforce Merge Order
on:
  pull_request:
    branches: [main]
jobs:
  Check-Source-Branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch was merged to dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE: ${{ github.head_ref }}
          REPO: ${{ github.repository }}
        run: |
            git fetch origin dev
            SOURCE_SHA=$(git rev-parse "origin/$SOURCE")
            if ! git diff --quiet "origin/dev...$SOURCE_SHA"; then
            echo "ERROR: '$SOURCE' has changes not on dev. Merge to dev first."
            exit 1
            fi
            echo "OK: '$SOURCE' is fully merged to dev."