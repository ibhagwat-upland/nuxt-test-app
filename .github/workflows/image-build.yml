name: Docker Image Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: nuxt-test-app
  DOCKER_BUILD_FILE: docker/Dockerfile-prod
  DOCKER_REGISTRY: ibhagwatupland

jobs:
  Build-On-Runner:
    runs-on: ubuntu-latest
    environment: dev
    env:
      DOCKER_BUILDKIT: 1
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        run: |
          # Get the latest vX.Y.Z tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: ${LATEST_TAG}"

          # Parse major.minor.patch
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Read commits since last tag to determine bump type
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          # Determine bump: BREAKING CHANGE → major, feat → minor, else → patch
          if echo "$COMMITS" | grep -qiE "^.*BREAKING CHANGE|^.*!:"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: ${NEXT_VERSION}"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ steps.version.outputs.version }}-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up Docker buildx env
        uses: docker/setup-buildx-action@v3

      - name: Login to Upland's private Docker hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKER_BUILD_FILE }}
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image-tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=local,src=/datadrive/.cache-docker
          cache-to: type=local,dest=/datadrive/.cache-docker

      - name: Logout from Docker
        run: docker logout
