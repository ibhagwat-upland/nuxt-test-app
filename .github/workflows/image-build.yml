name: Docker Image Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  IMAGE_NAME: nuxt-test-app
  DOCKER_BUILD_FILE: docker/Dockerfile-prod
  DOCKER_REGISTRY: ibhagwatupland

jobs:
  Build-On-Runner:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
      pull-requests: read
    env:
      DOCKER_BUILDKIT: 1
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        run: |
          # Get the latest vX.Y.Z tag, default to v0.0.0 if none exist
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: ${LATEST_TAG}"

          # Parse major.minor.patch
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Get the most recent commit (the squashed PR merge)
          LATEST_COMMIT=$(git log -1 --format="%s")
          echo "Latest commit: $LATEST_COMMIT"

          # Extract PR number from commit message (GitHub adds "#123" to squash commits)
          PR_NUMBER=$(echo "$LATEST_COMMIT" | grep -oE '\(#[0-9]+\)' | grep -oE '[0-9]+')

          # Default to patch bump
          BUMP_TYPE="patch"

          if [ -n "$PR_NUMBER" ]; then
            echo "Found PR #$PR_NUMBER"
            
            # Fetch PR labels using GitHub API
            PR_LABELS=$(curl -s -H "Authorization: token ${{ github.token }}" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | \
              jq -r '.labels[].name')
            
            if [ -n "$PR_LABELS" ]; then
              echo "PR Labels: $PR_LABELS"
              
              # Check labels in order of precedence: breaking > feature > fix > chore
              if echo "$PR_LABELS" | grep -q "^breaking$"; then
                BUMP_TYPE="major"
                echo "Detected: 'breaking' label (major bump)"
              elif echo "$PR_LABELS" | grep -q "^feature$"; then
                BUMP_TYPE="minor"
                echo "Detected: 'feature' label (minor bump)"
              elif echo "$PR_LABELS" | grep -q "^fix$"; then
                BUMP_TYPE="patch"
                echo "Detected: 'fix' label (patch bump)"
              elif echo "$PR_LABELS" | grep -q "^chore$"; then
                BUMP_TYPE="patch"
                echo "Detected: 'chore' label (patch bump)"
              else
                echo "No version bump label found, defaulting to patch bump"
              fi
            else
              echo "Could not fetch PR labels, defaulting to patch bump"
            fi
          else
            echo "No PR number found in commits, defaulting to patch bump"
          fi

          # Apply version bump
          if [ "$BUMP_TYPE" = "major" ]; then
            echo "Applying: MAJOR bump"
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            echo "Applying: MINOR bump"
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            echo "Applying: PATCH bump"
            PATCH=$((PATCH + 1))
          fi

          NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: ${NEXT_VERSION}"
          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${{ steps.version.outputs.version }}-${SHORT_SHA}"
          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Set up Docker buildx env
        uses: docker/setup-buildx-action@v3

      - name: Login to Upland's private Docker hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKER_BUILD_FILE }}
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image-tag }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Logout from Docker
        run: docker logout

      - name: Rollback git tag on failure
        if: failure() && steps.version.outputs.version != ''
        run: |
          echo "Build failed - removing tag ${{ steps.version.outputs.version }}"
          git push --delete origin "${{ steps.version.outputs.version }}" || echo "Tag already removed or does not exist on remote"
